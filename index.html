<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSI Monitor Prototype</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        body { background: #0b0b0b; color: #00ff41; font-family: 'Courier New', monospace; text-align: center; margin: 0; padding: 20px; }
        #status { font-size: 14px; margin-bottom: 10px; color: #888; }
        canvas { border: 2px solid #222; max-width: 100%; height: auto; box-shadow: 0 0 20px rgba(0,255,65,0.1); }
        .info { margin-top: 15px; color: #555; font-size: 12px; }
    </style>
</head>
<body>
    <h3>SYSTEM MONITOR v1.3</h3>
    <div id="status">Waiting for handshake from the computer...</div>
    
    <canvas id="stream-canvas"></canvas>

    <div class="info">Auto-syncing via Ably Realtime</div>

    <div id="debug-log" style="background:#000; color:#0f0; font-size:10px; text-align:left; height:100px; overflow:y-scroll; border:1px solid #333; margin-top:10px;">
    System Logs Ready...
    </div>

    <script>
        // 1. SETUP EVERYTHING FIRST
        const logDiv = document.getElementById('debug-log');
        const canvas = document.getElementById('stream-canvas');
        const ctx = canvas.getContext('2d');
        const statusDiv = document.getElementById('status');
        const img = new Image();
        let currentStreamUrl = "";

        // Initialize Ably immediately
        const ably = new Ably.Realtime('g3LxQQ.VN4WNQ:AykX5Knk-nJiwR9tTvFamKdp8XDMtleNrD7JN7L1C2M');
        const channel = ably.channels.get('tunnel-handshake');

        function log(msg) {
            logDiv.innerHTML += `<div>> ${msg}</div>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        // 2. DEFINE THE FUNCTIONS
        async function debugStream() {
            if (!currentStreamUrl) return;
            log("Testing connection...");
            try {
                const response = await fetch(currentStreamUrl + "?t=" + new Date().getTime(), {
                    headers: { 'x-pinggy-no-screen': 'true' }
                });
                log("Status: " + response.status);
                log("Type: " + response.headers.get('content-type'));

                if (response.headers.get('content-type').includes('text/html')) {
                    log("!! BLOCKED: Still getting the Pinggy Warning Page.");
                } else {
                    log("SUCCESS: Image data received.");
                }
            } catch (e) {
                log("ERROR: " + e.message);
            }
        }

        function updateFrame() {
            if (!currentStreamUrl) return;
            img.src = currentStreamUrl + "?t=" + new Date().getTime();
        }

        // 3. SET UP THE LISTENERS
        img.onload = function() {
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.drawImage(img, 0, 0);
            setTimeout(updateFrame, 33); 
        };

        img.onerror = function() {
            // This confirms the browser is blocking the link
            setTimeout(updateFrame, 500);
        };

        channel.subscribe('update', (message) => {
            let secureUrl = message.data.replace("http://", "https://");
            currentStreamUrl = secureUrl + "/video_feed";
            statusDiv.innerText = "CONNECTED: " + secureUrl;
            statusDiv.style.color = "#00ff41";
            log("New Handshake Received");
            debugStream(); 
            updateFrame();
        });
    </script>
</body>
</html>
